<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #87CEEB;
  font-family: Arial;
  touch-action: none;
}
canvas {
  display: block;
  background: white;
}
#startScreen {
  position: fixed;
  inset: 0;
  background: rgba(135,206,235,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
#menu {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 260px;
  text-align: center;
}
.skin {
  width: 40px;
  height: 40px;
  display: inline-block;
  border-radius: 6px;
  margin: 5px;
  border: 2px solid transparent;
}
.skin.selected { border-color: black; }
#leaderboard {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.9);
  padding: 8px;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="startScreen">
  <div id="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Имя"><br><br>
    <div id="skins">
      <div class="skin selected" data-color="green" style="background:green"></div>
      <div class="skin" data-color="blue" style="background:blue"></div>
      <div class="skin" data-color="red" style="background:red"></div>
      <div class="skin" data-color="purple" style="background:purple"></div>
    </div><br>
    <button id="playBtn">PLAY</button>
  </div>
</div>

<canvas id="game"></canvas>
<div id="leaderboard"></div>

<script>
/* ---------- CANVAS ---------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();

/* ---------- STORAGE ---------- */
let playerName = localStorage.getItem("name");
let playerColor = localStorage.getItem("color") || "green";

/* ---------- UI ---------- */
const startScreen = document.getElementById("startScreen");
if(playerName) startScreen.style.display = "none";

document.querySelectorAll(".skin").forEach(s=>{
  if(s.dataset.color === playerColor) s.classList.add("selected");
  s.onclick = ()=>{
    document.querySelectorAll(".skin").forEach(x=>x.classList.remove("selected"));
    s.classList.add("selected");
    playerColor = s.dataset.color;
  };
});

document.getElementById("playBtn").onclick = ()=>{
  playerName = document.getElementById("nameInput").value || "Player";
  localStorage.setItem("name",playerName);
  localStorage.setItem("color",playerColor);
  startScreen.style.display="none";
  startGame();
};

/* ---------- GAME ---------- */
let gravity = 0.4;
let score = 0;
let platforms = [];
let monsters = [];

const player = {
  x: canvas.width/2-20,
  y: canvas.height-200,
  width: 40,
  height: 40,
  vy: 0,
  jump: -15,
  speedX: 0
};

function startGame(){
  score=0;
  platforms=[];
  monsters=[];
  player.y = canvas.height-200;
  player.vy = player.jump;

  platforms.push({
    x: player.x,
    y: player.y+50,
    width: 100,
    height: 12,
    type: "normal",
    counted: true
  });

  for(let i=1;i<12;i++){
    platforms.push(createPlatform(platforms[i-1].y-90));
  }
}

function createPlatform(y){
  const r = Math.random();
  return {
    x: Math.random()*(canvas.width-80),
    y,
    width: 80,
    height: 12,
    type: r<0.15?"moving":r>0.85?"break":"normal",
    dir: Math.random()<0.5?-1:1,
    counted:false
  };
}

/* ---------- UPDATE ---------- */
function update(){
  player.vy += gravity;
  player.y += player.vy;
  player.x += player.speedX;

  if(player.x<-player.width) player.x=canvas.width;
  if(player.x>canvas.width) player.x=-player.width;

  platforms.forEach(p=>{
    if(p.type==="moving"){
      p.x+=p.dir*1.2;
      if(p.x<0||p.x+p.width>canvas.width) p.dir*=-1;
    }

    if(
      player.vy>0 &&
      player.y+player.height>=p.y &&
      player.y+player.height<=p.y+p.height+player.vy &&
      player.x+player.width>p.x &&
      player.x<p.x+p.width
    ){
      if(p.type==="break"){
        p.y=canvas.height+100;
      }else{
        player.vy=player.jump;
        if(!p.counted){ score++; p.counted=true; }
      }
    }
  });

  monsters.forEach(m=>{
    m.x+=m.dir*1.2;
    if(m.x<0||m.x+m.width>canvas.width) m.dir*=-1;

    if(
      player.x<m.x+m.width &&
      player.x+player.width>m.x &&
      player.y<m.y+m.height &&
      player.y+player.height>m.y
    ){
      startGame();
    }
  });

  if(player.y<canvas.height/2){
    const dy=-player.vy;
    platforms.forEach(p=>p.y+=dy);
    monsters.forEach(m=>m.y+=dy);
    player.y=canvas.height/2;

    platforms.forEach(p=>{
      if(p.y>canvas.height){
        const top=Math.min(...platforms.map(x=>x.y));
        Object.assign(p,createPlatform(top-90));
        if(score>5 && Math.random()<0.25){
          monsters.push({
            x:p.x+20,
            y:p.y-40,
            width:40,
            height:40,
            dir:Math.random()<0.5?-1:1
          });
        }
      }
    });
  }
}

/* ---------- DRAW ---------- */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=playerColor;
  ctx.fillRect(player.x,player.y,player.width,player.height);

  platforms.forEach(p=>{
    ctx.fillStyle=p.type==="moving"?"blue":p.type==="break"?"brown":"black";
    ctx.fillRect(p.x,p.y,p.width,p.height);
  });

  ctx.fillStyle="purple";
  monsters.forEach(m=>ctx.fillRect(m.x,m.y,m.width,m.height));

  ctx.fillStyle="black";
  ctx.fillText(`${playerName}: ${score}`,10,30);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

/* ---------- CONTROLS ---------- */
addEventListener("touchstart",e=>{
  e.preventDefault();
  player.speedX=e.touches[0].clientX<canvas.width/2?-4:4;
},{passive:false});
addEventListener("touchend",()=>player.speedX=0);
addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") player.speedX=-4;
  if(e.key==="ArrowRight") player.speedX=4;
});
addEventListener("keyup",()=>player.speedX=0);
</script>

</body>
</html>
