<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Arial;
  background: #87CEEB;
}

canvas {
  display: block;
  background: white;
  touch-action: none;
  pointer-events: none; /* выключен до старта */
}

/* ---------- MENU ---------- */
#startScreen {
  position: fixed;
  inset: 0;
  background: rgba(135,206,235,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#menu {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 260px;
  text-align: center;
}

#menu input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

.skins {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.skin {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
}

.skin.selected {
  border-color: black;
}

button {
  width: 100%;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="startScreen">
  <div id="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Введите имя">

    <div class="skins">
      <div class="skin selected" data-color="green" style="background:green"></div>
      <div class="skin" data-color="blue" style="background:blue"></div>
      <div class="skin" data-color="red" style="background:red"></div>
      <div class="skin" data-color="purple" style="background:purple"></div>
    </div>

    <button id="playBtn">PLAY</button>
  </div>
</div>

<canvas id="game"></canvas>

<script>
/* ---------- CANVAS ---------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* ---------- UI ---------- */
const startScreen = document.getElementById("startScreen");
const nameInput = document.getElementById("nameInput");
const playBtn = document.getElementById("playBtn");

/* ---------- PLAYER DATA ---------- */
let playerName = "";
let playerColor = "green";

/* ---------- SKINS ---------- */
document.querySelectorAll(".skin").forEach(skin => {
  skin.onclick = () => {
    document.querySelectorAll(".skin").forEach(s => s.classList.remove("selected"));
    skin.classList.add("selected");
    playerColor = skin.dataset.color;
  };
});

/* ---------- GAME STATE ---------- */
let gameStarted = false;
let gravity = 0.4;

/* ---------- PLAYER ---------- */
const player = {
  x: 0,
  y: 0,
  w: 40,
  h: 40,
  vy: 0,
  jump: -15
};

let platforms = [];

/* ---------- PLAY ---------- */
playBtn.onclick = () => {
  playerName = nameInput.value || "Player";
  startScreen.style.display = "none";
  canvas.style.pointerEvents = "auto";
  startGame();
};

/* ---------- START GAME ---------- */
function startGame() {
  gameStarted = true;
  platforms = [];

  player.x = canvas.width / 2 - player.w / 2;
  player.y = canvas.height - 300;
  player.vy = player.jump;

  // 🔥 стартовая платформа (ГАРАНТИЯ)
  platforms.push({
    x: player.x - 30,
    y: player.y + 60,
    w: 120,
    h: 12
  });

  // 🔥 остальные платформы вверх
  for (let i = 1; i < 10; i++) {
    platforms.push({
      x: Math.random() * (canvas.width - 80),
      y: platforms[i - 1].y - 90,
      w: 80,
      h: 12
    });
  }
}

/* ---------- UPDATE ---------- */
function update() {
  if (!gameStarted) return;

  player.vy += gravity;
  player.y += player.vy;

  platforms.forEach(p => {
    if (
      player.vy > 0 &&
      player.y + player.h >= p.y &&
      player.y + player.h <= p.y + p.h + player.vy &&
      player.x + player.w > p.x &&
      player.x < p.x + p.w
    ) {
      player.vy = player.jump;
    }
  });

  if (player.y > canvas.height) {
    gameStarted = false;
    canvas.style.pointerEvents = "none";
    startScreen.style.display = "flex";
  }
}

/* ---------- DRAW ---------- */
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = playerColor;
  ctx.fillRect(player.x, player.y, player.w, player.h);

  ctx.fillStyle = "black";
  platforms.forEach(p => {
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });
}

/* ---------- LOOP ---------- */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
