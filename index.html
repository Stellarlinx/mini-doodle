<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #87CEEB;
  touch-action: none;
  font-family: Arial;
}
canvas {
  display: block;
  background: white;
}
#leaderboard {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.9);
  padding: 8px;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="leaderboard"></div>

<script>
/* ---------- ИМЯ И ЛИДЕРБОРД ---------- */
let playerName = localStorage.getItem("playerName");
if(!playerName){
  playerName = prompt("Введите имя:");
  if(!playerName) playerName = "Player";
  localStorage.setItem("playerName", playerName);
}

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

/* ---------- CANVAS ---------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ---------- ПЕРЕМЕННЫЕ ---------- */
let gravity = 0.4;
let score = 0;
let gameStarted = false;

let player = {
  x: canvas.width / 2 - 20,
  y: canvas.height - 200,
  width: 40,
  height: 40,
  velocityY: 0,
  jump: -15,
  superJump: -25,
  speedX: 0
};

let platforms = [];
let springs = [];
let monsters = [];

/* ---------- ПЛАТФОРМЫ ---------- */
function createPlatforms(){
  platforms = [];
  springs = [];
  monsters = [];
  score = 0;

  const gap = 90;

  platforms.push({
    x: player.x,
    y: player.y + player.height + 10,
    width: 100,
    height: 12,
    type: "normal",
    counted: true
  });

  const count = Math.ceil(canvas.height / gap);

  for(let i = 1; i < count; i++){
    let rand = Math.random();
    let type = "normal";
    if(rand < 0.15) type = "moving";
    if(rand > 0.85) type = "break";

    let p = {
      x: Math.random() * (canvas.width - 80),
      y: platforms[i - 1].y - gap,
      width: 80,
      height: 12,
      type,
      dir: Math.random() < 0.5 ? -1 : 1,
      counted: false
    };

    platforms.push(p);

    if(Math.random() < 0.1){
      springs.push({
        x: p.x + 30,
        y: p.y - 12,
        width: 20,
        height: 12
      });
    }

    if(Math.random() < 0.08){
      monsters.push({
        x: p.x + 20,
        y: p.y - 40,
        width: 40,
        height: 40,
        dir: Math.random() < 0.5 ? -1 : 1
      });
    }
  }

  player.velocityY = player.jump;
  gameStarted = true;
}

/* ---------- РИСОВАНИЕ ---------- */
function drawPlayer(){
  ctx.fillStyle = "green";
  ctx.fillRect(player.x, player.y, player.width, player.height);
}

function drawPlatforms(){
  platforms.forEach(p=>{
    ctx.fillStyle =
      p.type === "normal" ? "black" :
      p.type === "moving" ? "blue" : "brown";
    ctx.fillRect(p.x, p.y, p.width, p.height);
  });
}

function drawSprings(){
  ctx.fillStyle = "red";
  springs.forEach(s=>{
    ctx.fillRect(s.x, s.y, s.width, s.height);
  });
}

function drawMonsters(){
  ctx.fillStyle = "purple";
  monsters.forEach(m=>{
    ctx.fillRect(m.x, m.y, m.width, m.height);
  });
}

function drawScore(){
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText(`${playerName}: ${score}`, 10, 30);
}

function updateLeaderboardUI(){
  leaderboard.sort((a,b)=>b.score - a.score);
  leaderboard = leaderboard.slice(0,5);
  localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

  const div = document.getElementById("leaderboard");
  div.innerHTML = "<b>🏆 ТОП-5</b><br>" +
    leaderboard.map((p,i)=>`${i+1}. ${p.name}: ${p.score}`).join("<br>");
}

/* ---------- ОБНОВЛЕНИЕ ---------- */
function update(){
  if(!gameStarted) return;

  player.velocityY += gravity;
  player.y += player.velocityY;
  player.x += player.speedX;

  if(player.x < -player.width) player.x = canvas.width;
  if(player.x > canvas.width) player.x = -player.width;

  platforms.forEach(p=>{
    if(p.type === "moving"){
      p.x += p.dir * 1.2;
      if(p.x < 0 || p.x + p.width > canvas.width) p.dir *= -1;
    }
  });

  monsters.forEach(m=>{
    m.x += m.dir * 1;
    if(m.x < 0 || m.x + m.width > canvas.width) m.dir *= -1;
  });

  platforms.forEach(p=>{
    if(
      player.velocityY > 0 &&
      player.y + player.height >= p.y &&
      player.y + player.height <= p.y + p.height + player.velocityY &&
      player.x + player.width > p.x &&
      player.x < p.x + p.width
    ){
      if(p.type === "break"){
        p.y = canvas.height + 100;
      } else {
        player.velocityY = player.jump;
        if(!p.counted){
          score++;
          p.counted = true;
        }
      }
    }
  });

  springs.forEach(s=>{
    if(
      player.velocityY > 0 &&
      player.y + player.height >= s.y &&
      player.x + player.width > s.x &&
      player.x < s.x + s.width
    ){
      player.velocityY = player.superJump;
    }
  });

  monsters.forEach(m=>{
    if(
      player.x < m.x + m.width &&
      player.x + player.width > m.x &&
      player.y < m.y + m.height &&
      player.y + player.height > m.y
    ){
      gameOver();
    }
  });

 if(player.y < canvas.height / 2){
  const dy = -player.velocityY;

  platforms.forEach(p => p.y += dy);
  springs.forEach(s => s.y += dy);
  monsters.forEach(m => m.y += dy);

  player.y = canvas.height / 2;

  // 🔁 пересоздание платформ
  platforms.forEach(p => {
    if(p.y > canvas.height){
      const highest = Math.min(...platforms.map(pl => pl.y));

      p.y = highest - 90;
      p.x = Math.random() * (canvas.width - p.width);
      p.counted = false;

      // 🎲 тип платформы
      const r = Math.random();
      p.type = r < 0.15 ? "moving" : r > 0.85 ? "break" : "normal";
      p.dir = Math.random() < 0.5 ? -1 : 1;

      // ❌ убрать старые пружины и монстров с этой платформы
      springs = springs.filter(s => s.y < canvas.height);
      monsters = monsters.filter(m => m.y < canvas.height);

      // ➕ шанс добавить пружину
      if(Math.random() < 0.1){
        springs.push({
          x: p.x + p.width / 2 - 10,
          y: p.y - 12,
          width: 20,
          height: 12
        });
      }

      // ➕ шанс добавить монстра
      if(Math.random() < 0.08){
        monsters.push({
          x: p.x + p.width / 2 - 20,
          y: p.y - 40,
          width: 40,
          height: 40,
          dir: Math.random() < 0.5 ? -1 : 1
        });
      }
    }
  });
}

  if(player.y > canvas.height){
    gameOver();
  }
}

function gameOver(){
  leaderboard.push({ name: playerName, score });
  updateLeaderboardUI();
  alert(`Game Over!\n${playerName}: ${score}`);
  location.reload();
}

/* ---------- ЦИКЛ ---------- */
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  update();
  drawPlayer();
  drawPlatforms();
  drawSprings();
  drawMonsters();
  drawScore();
  requestAnimationFrame(loop);
}

/* ---------- УПРАВЛЕНИЕ ---------- */
document.addEventListener("touchstart", e=>{
  e.preventDefault();
  let x = e.touches[0].clientX;
  player.speedX = x < canvas.width / 2 ? -4 : 4;
}, { passive:false });

document.addEventListener("touchend", ()=>player.speedX = 0);

document.addEventListener("keydown", e=>{
  if(e.key === "ArrowLeft") player.speedX = -4;
  if(e.key === "ArrowRight") player.speedX = 4;
});
document.addEventListener("keyup", ()=>player.speedX = 0);

/* ---------- СТАРТ ---------- */
updateLeaderboardUI();
createPlatforms();
loop();
</script>
</body>
</html>
