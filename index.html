<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
* {
  user-select: none;
  -webkit-user-select: none;
  -ms-user-select: none;
}

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #87CEEB;
  font-family: Arial;
}

canvas {
  display: block;
  background: white;
  touch-action: none;
}

/* ---------- MENU ---------- */
#startScreen {
  position: fixed;
  inset: 0;
  background: rgba(135,206,235,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#menu {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 260px;
  text-align: center;
}

#menu input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  user-select: text;
}

.skins {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.skin {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
}

.skin.selected {
  border-color: black;
}

button {
  width: 100%;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="startScreen">
  <div id="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Введите имя">

    <div class="skins">
      <div class="skin selected" data-color="green" style="background:green"></div>
      <div class="skin" data-color="blue" style="background:blue"></div>
      <div class="skin" data-color="red" style="background:red"></div>
      <div class="skin" data-color="purple" style="background:purple"></div>
    </div>

    <button id="playBtn">PLAY</button>
  </div>
</div>

<canvas id="game"></canvas>

<script>
/* ---------- CANVAS ---------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* ---------- UI ---------- */
const startScreen = document.getElementById("startScreen");
const nameInput = document.getElementById("nameInput");

/* ---------- STORAGE ---------- */
let playerName = localStorage.getItem("playerName") || "";
let playerColor = localStorage.getItem("playerColor") || "green";
nameInput.value = playerName;

/* ---------- SKINS ---------- */
document.querySelectorAll(".skin").forEach(s => {
  if (s.dataset.color === playerColor) s.classList.add("selected");

  s.onclick = () => {
    document.querySelectorAll(".skin").forEach(x => x.classList.remove("selected"));
    s.classList.add("selected");
    playerColor = s.dataset.color;
  };
});

/* ---------- GAME STATE ---------- */
let gameStarted = false;
let gravity = 0.4;
let score = 0;

/* ---------- PLAYER ---------- */
const player = {
  x: 0,
  y: 0,
  w: 40,
  h: 40,
  vy: 0,
  jump: -15,
  speedX: 0
};

let platforms = [];
let monsters = [];

/* ---------- START ---------- */
document.getElementById("playBtn").onclick = () => {
  playerName = nameInput.value || "Player";
  localStorage.setItem("playerName", playerName);
  localStorage.setItem("playerColor", playerColor);

  startScreen.style.display = "none";
  startGame();
};

function startGame() {
  score = 0;
  platforms = [];
  monsters = [];
  gameStarted = true;

  player.x = canvas.width / 2 - player.w / 2;
  player.y = canvas.height - 200;
  player.vy = player.jump;

  platforms.push(createPlatform(player.y + 60, "normal", true));

  for (let i = 1; i < 14; i++) {
    platforms.push(createPlatform(platforms[i - 1].y - 90));
  }
}

/* ---------- PLATFORM FACTORY ---------- */
function createPlatform(y, forcedType = null, counted = false) {
  const r = Math.random();
  const type = forcedType || (r < 0.15 ? "moving" : r < 0.3 ? "break" : "normal");

  return {
    x: Math.random() * (canvas.width - 80),
    y,
    w: 80,
    h: 12,
    type,
    dx: Math.random() < 0.5 ? -1 : 1,
    counted
  };
}

/* ---------- UPDATE ---------- */
function update() {
  if (!gameStarted) return;

  player.vy += gravity;
  player.y += player.vy;
  player.x += player.speedX;

  if (player.x < -player.w) player.x = canvas.width;
  if (player.x > canvas.width) player.x = -player.w;

  platforms.forEach(p => {
    if (p.type === "moving") {
      p.x += p.dx * 1.2;
      if (p.x < 0 || p.x + p.w > canvas.width) p.dx *= -1;
    }

    if (
      player.vy > 0 &&
      player.y + player.h >= p.y &&
      player.y + player.h <= p.y + p.h + player.vy &&
      player.x + player.w > p.x &&
      player.x < p.x + p.w
    ) {
      if (p.type === "break") {
        p.y = canvas.height + 100;
      } else {
        player.vy = player.jump;
        if (!p.counted) {
          score++;
          p.counted = true;
        }
      }
    }
  });

  if (score >= 6 && Math.random() < 0.01 && monsters.length < 3) {
    monsters.push({
      x: Math.random() * (canvas.width - 40),
      y: -40,
      w: 40,
      h: 40,
      dx: Math.random() < 0.5 ? -1 : 1
    });
  }

  monsters.forEach(m => {
    m.x += m.dx * 1.5;
    if (m.x < 0 || m.x + m.w > canvas.width) m.dx *= -1;

    if (
      player.x < m.x + m.w &&
      player.x + player.w > m.x &&
      player.y < m.y + m.h &&
      player.y + player.h > m.y
    ) {
      startGame();
    }
  });

  if (player.y < canvas.height / 2) {
    const dy = -player.vy;
    player.y = canvas.height / 2;
    platforms.forEach(p => p.y += dy);
    monsters.forEach(m => m.y += dy);

    platforms.forEach(p => {
      if (p.y > canvas.height) {
        const top = Math.min(...platforms.map(pl => pl.y));
        Object.assign(p, createPlatform(top - 90));
      }
    });
  }

  if (player.y > canvas.height) startGame();
}

/* ---------- DRAW ---------- */
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = playerColor;
  ctx.fillRect(player.x, player.y, player.w, player.h);

  platforms.forEach(p => {
    ctx.fillStyle =
      p.type === "moving" ? "blue" :
      p.type === "break" ? "brown" : "black";
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });

  ctx.fillStyle = "purple";
  monsters.forEach(m => ctx.fillRect(m.x, m.y, m.w, m.h));

  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText(`${playerName}: ${score}`, 10, 30);
}

/* ---------- LOOP ---------- */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

/* ---------- CONTROLS ---------- */
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  const x = e.touches[0].clientX;
  player.speedX = x < canvas.width / 2 ? -4 : 4;
}, { passive: false });

canvas.addEventListener("touchend", e => {
  e.preventDefault();
  player.speedX = 0;
}, { passive: false });

addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") player.speedX = -4;
  if (e.key === "ArrowRight") player.speedX = 4;
});

addEventListener("keyup", () => player.speedX = 0);
</script>

</body>
</html>
