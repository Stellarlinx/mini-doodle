<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #87CEEB;
  font-family: Arial;
}

canvas {
  display: block;
  background: white;
  touch-action: none;
}

/* ---------- MENU ---------- */
#startScreen {
  position: fixed;
  inset: 0;
  background: rgba(135,206,235,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#menu {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 260px;
  text-align: center;
}

#menu input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

.skins {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.skin {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
}

.skin.selected {
  border-color: black;
}

button {
  width: 100%;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="startScreen">
  <div id="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Введите имя">

    <div class="skins">
      <div class="skin selected" data-color="green" style="background:green"></div>
      <div class="skin" data-color="blue" style="background:blue"></div>
      <div class="skin" data-color="red" style="background:red"></div>
      <div class="skin" data-color="purple" style="background:purple"></div>
    </div>

    <button id="playBtn">PLAY</button>
  </div>
</div>

<canvas id="game"></canvas>

<script>
/* ---------- CANVAS ---------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* ---------- UI ---------- */
const startScreen = document.getElementById("startScreen");
const nameInput = document.getElementById("nameInput");

/* ---------- PLAYER DATA ---------- */
let playerName = localStorage.getItem("playerName") || "";
let playerColor = localStorage.getItem("playerColor") || "green";

nameInput.value = playerName;

/* ---------- SKINS ---------- */
document.querySelectorAll(".skin").forEach(skin => {
  if (skin.dataset.color === playerColor) skin.classList.add("selected");

  skin.onclick = () => {
    document.querySelectorAll(".skin").forEach(s => s.classList.remove("selected"));
    skin.classList.add("selected");
    playerColor = skin.dataset.color;
  };
});

/* ---------- GAME STATE ---------- */
let gameStarted = false;
let gravity = 0.4;
let score = 0;

const player = {
  x: 0,
  y: 0,
  w: 40,
  h: 40,
  vy: 0,
  jump: -15,
  speedX: 0
};

let platforms = [];

/* ---------- START BUTTON ---------- */
document.getElementById("playBtn").onclick = () => {
  playerName = nameInput.value || "Player";
  localStorage.setItem("playerName", playerName);
  localStorage.setItem("playerColor", playerColor);

  startScreen.style.display = "none";
  startGame();
};

/* ---------- START GAME ---------- */
function startGame() {
  score = 0;
  platforms = [];
  gameStarted = true;

  player.x = canvas.width / 2 - player.w / 2;
  player.y = canvas.height - 200;
  player.vy = player.jump;

  platforms.push({
    x: player.x - 20,
    y: player.y + 50,
    w: 100,
    h: 12,
    counted: true
  });

  for (let i = 1; i < 12; i++) {
    platforms.push({
      x: Math.random() * (canvas.width - 80),
      y: platforms[i - 1].y - 90,
      w: 80,
      h: 12,
      counted: false
    });
  }
}

/* ---------- UPDATE ---------- */
function update() {
  if (!gameStarted) return;

  player.vy += gravity;
  player.y += player.vy;
  player.x += player.speedX;

  if (player.x < -player.w) player.x = canvas.width;
  if (player.x > canvas.width) player.x = -player.w;

  platforms.forEach(p => {
    if (
      player.vy > 0 &&
      player.y + player.h >= p.y &&
      player.y + player.h <= p.y + p.h + player.vy &&
      player.x + player.w > p.x &&
      player.x < p.x + p.w
    ) {
      player.vy = player.jump;
      if (!p.counted) {
        score++;
        p.counted = true;
      }
    }
  });

  if (player.y < canvas.height / 2) {
    const dy = -player.vy;
    player.y = canvas.height / 2;
    platforms.forEach(p => p.y += dy);

    platforms.forEach(p => {
      if (p.y > canvas.height) {
        const top = Math.min(...platforms.map(pl => pl.y));
        p.y = top - 90;
        p.x = Math.random() * (canvas.width - p.w);
        p.counted = false;
      }
    });
  }

  if (player.y > canvas.height) {
    startGame();
  }
}

/* ---------- DRAW ---------- */
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = playerColor;
  ctx.fillRect(player.x, player.y, player.w, player.h);

  ctx.fillStyle = "black";
  platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText(`${playerName}: ${score}`, 10, 30);
}

/* ---------- LOOP ---------- */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

/* ---------- CONTROLS ---------- */
canvas.addEventListener("touchstart", e => {
  const x = e.touches[0].clientX;
  player.speedX = x < canvas.width / 2 ? -4 : 4;
});

canvas.addEventListener("touchend", () => {
  player.speedX = 0;
});

addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") player.speedX = -4;
  if (e.key === "ArrowRight") player.speedX = 4;
});

addEventListener("keyup", () => {
  player.speedX = 0;
});
</script>

</body>
</html>
