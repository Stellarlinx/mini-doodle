<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Doodle</title>
<style>
body { margin:0; overflow:hidden; background:#87CEEB; }
canvas { background:white; display:block; margin:0 auto; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gravity = 0.4;

let player = {
  x: canvas.width / 2 - 20,
  y: canvas.height - 150,
  width: 40,
  height: 40,
  velocityY: -15,
  jump: -15
};

let platforms = [];
let score = 0;

function createPlatforms(){
  platforms = [];

  // первая платформа под игроком
  platforms.push({
    x: player.x,
    y: player.y + 60,
    width: 60,
    height: 10,
    counted: false
  });

  for(let i=1;i<6;i++){
    platforms.push({
      x: Math.random() * (canvas.width - 60),
      y: i * 120,
      width: 60,
      height: 10,
      counted: false
    });
  }
}

function drawPlayer(){
  ctx.fillStyle="green";
  ctx.fillRect(player.x,player.y,player.width,player.height);
}

function drawPlatforms(){
  ctx.fillStyle="black";
  platforms.forEach(p=>{
    ctx.fillRect(p.x,p.y,p.width,p.height);
  });
}

function update(){
  player.velocityY += gravity;
  player.y += player.velocityY;

  platforms.forEach(p=>{
    if(
      player.y + player.height >= p.y &&
      player.y + player.height <= p.y + p.height &&
      player.x + player.width > p.x &&
      player.x < p.x + p.width &&
      player.velocityY > 0
    ){
      player.velocityY = player.jump;

      if(!p.counted){
        score++;
        p.counted = true;
      }
    }
  });

  if(player.y < canvas.height / 2){
    platforms.forEach(p=>{
      p.y += -player.velocityY;

      if(p.y > canvas.height){
        p.y = 0;
        p.x = Math.random() * (canvas.width - 60);
        p.counted = false;
      }
    });
  }

  if(player.y > canvas.height){
    alert("Game Over! Score: " + score);
    location.reload();
  }
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  update();
  drawPlayer();
  drawPlatforms();

  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);

  requestAnimationFrame(loop);
}

document.addEventListener("touchstart",e=>{
  if(e.touches[0].clientX < canvas.width / 2) player.x -= 40;
  else player.x += 40;
});

createPlatforms();
loop();
</script>

</body>
</html>
