<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
html,body{
  margin:0;padding:0;overflow:hidden;
  background:#87CEEB;font-family:Arial;
}
  .skin img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 6px;
  pointer-events: none;
}
canvas{
  display:block;
  touch-action:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}
#startScreen,#gameOverScreen{
  position:fixed;inset:0;
  background:rgba(135,206,235,.95);
  display:flex;align-items:center;justify-content:center;
  z-index:10;
}
.menu{
  background:white;padding:20px;border-radius:12px;
  width:260px;text-align:center;
}
input{width:100%;padding:8px;margin-bottom:10px;}
.skins{display:flex;justify-content:space-between;margin-bottom:10px;}
.skin{
  width:40px;height:40px;border-radius:6px;
  border:2px solid transparent;cursor:pointer;
}
.skin.selected{border-color:black;}
button{
  width:100%;padding:10px;font-size:16px;margin-top:6px;
}
#leaderboard{
  position:fixed;top:8px;right:8px;
  background:rgba(255,255,255,.9);
  padding:6px 8px;border-radius:6px;font-size:12px;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <div class="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Имя">
    <div class="skins">
  <div class="skin selected" data-color="green">
    <img src="img/player_green.png">
  </div>
  <div class="skin" data-color="blue">
    <img src="img/player_blue.png">
  </div>
  <div class="skin" data-color="red">
    <img src="img/player_red.png">
  </div>
  <div class="skin" data-color="purple">
    <img src="img/player_purple.png">
  </div>
</div>
    <button id="playBtn">PLAY</button>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" style="display:none">
  <div class="menu">
    <h3>Game Over</h3>
    <p id="finalScore"></p>
    <button onclick="restartGame()">🔁 Restart</button>
    <button onclick="goHome()">🏠 Home</button>
  </div>
</div>

<canvas id="game"></canvas>
<div id="leaderboard"></div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let GAME_WIDTH = 420;

function resize(){
if(innerWidth < 768) GAME_WIDTH = innerWidth;

canvas.width = GAME_WIDTH;
canvas.height = innerHeight;
}

resize();
addEventListener("resize",resize);


/* IMAGES */

const bgImage = new Image();
bgImage.src = "img/bg.png";

const playerSkins = {
green:new Image(),
blue:new Image(),
red:new Image(),
purple:new Image()
};

playerSkins.green.src="img/player_green.png";
playerSkins.blue.src="img/player_blue.png";
playerSkins.red.src="img/player_red.png";
playerSkins.purple.src="img/player_purple.png";

const springImage=new Image();
springImage.src="img/spring.png";

const coinImage=new Image();
coinImage.src="img/coin.png";

const monsterImages=[
"img/monster1.png",
"img/monster2.png"
].map(src=>{
let i=new Image();
i.src=src;
return i;
});


/* DATA */

let playerName=localStorage.getItem("name")||"";
let playerColor=localStorage.getItem("color")||"green";
let score=0;
let gameStarted=false;


/* PLAYER */

const player={
x:0,
y:0,
w:40,
h:40,
vx:0,
vy:0
};

const GRAVITY=0.4;
const JUMP=-15;
const SPEED=4;


/* OBJECTS */

let platforms=[];
let springs=[];
let coins=[];
let monsters=[];


/* UI */

document.getElementById("nameInput").value=playerName;

document.querySelectorAll(".skin").forEach(s=>{

if(s.dataset.color===playerColor)
s.classList.add("selected");

s.onclick=()=>{

document.querySelectorAll(".skin")
.forEach(x=>x.classList.remove("selected"));

s.classList.add("selected");

playerColor=s.dataset.color;

localStorage.setItem("color",playerColor);

};

});


document.getElementById("playBtn").onclick=()=>{

playerName=document.getElementById("nameInput").value||"Player";
localStorage.setItem("name",playerName);

document.getElementById("startScreen").style.display="none";

startGame();

};


/* START */

function startGame(){

gameStarted=true;
score=0;

platforms=[];
springs=[];
coins=[];
monsters=[];

player.x=GAME_WIDTH/2-20;
player.y=canvas.height-200;

player.vx=0;
player.vy=JUMP;

platforms.push({
x:player.x-40,
y:player.y+60,
w:100,
h:12
});

for(let i=0;i<10;i++){

spawnPlatform(canvas.height-i*90);

}

}


/* SPAWN PLATFORM */

function spawnPlatform(y){

let p={
x:Math.random()*(GAME_WIDTH-100),
y:y,
w:100,
h:12
};

platforms.push(p);

/* SPRING */

if(Math.random()<0.15){

springs.push({
x:p.x+p.w/2-10,
y:p.y-20,
w:20,
h:20
});

}

/* COIN */

if(Math.random()<0.25){

coins.push({
x:p.x+p.w/2-10,
y:p.y-40,
w:20,
h:20,
collected:false
});

}

}


/* UPDATE */

function update(){

if(!gameStarted) return;

player.vy+=GRAVITY;

player.x+=player.vx;
player.y+=player.vy;


/* SCREEN LOOP */

if(player.x<-player.w) player.x=GAME_WIDTH;
if(player.x>GAME_WIDTH) player.x=-player.w;


/* PLATFORM COLLISION */

platforms.forEach(p=>{

if(player.vy>0 &&
player.y+player.h>=p.y &&
player.y+player.h<=p.y+12 &&
player.x+player.w>p.x &&
player.x<p.x+p.w){

player.vy=JUMP;
score++;

}

});


/* SPRINGS */

springs.forEach(s=>{

if(player.vy>0 &&
player.x+player.w>s.x &&
player.x<s.x+s.w &&
player.y+player.h>=s.y &&
player.y+player.h<=s.y+20){

player.vy=JUMP*1.8;

}

});


/* COINS */

coins.forEach(c=>{

if(!c.collected &&
player.x<c.x+c.w &&
player.x+player.w>c.x &&
player.y<c.y+c.h &&
player.y+player.h>c.y){

c.collected=true;
score+=3;

}

});


/* CAMERA */

if(player.y<canvas.height*0.45){

let dy=-player.vy;

player.y=canvas.height*0.45;

platforms.forEach(p=>p.y+=dy);
springs.forEach(s=>s.y+=dy);
coins.forEach(c=>c.y+=dy);

}


if(player.y>canvas.height){

gameStarted=false;

document.getElementById("finalScore").innerText="Score: "+score;

document.getElementById("gameOverScreen").style.display="flex";

}

}


/* DRAW */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(bgImage,0,0,canvas.width,canvas.height);

ctx.drawImage(playerSkins[playerColor],player.x,player.y,player.w,player.h);


platforms.forEach(p=>{

ctx.fillStyle="black";
ctx.fillRect(p.x,p.y,p.w,p.h);

});


springs.forEach(s=>{
ctx.drawImage(springImage,s.x,s.y,s.w,s.h);
});


coins.forEach(c=>{
if(!c.collected)
ctx.drawImage(coinImage,c.x,c.y,c.w,c.h);
});


ctx.fillStyle="black";
ctx.font="20px Arial";
ctx.fillText(playerName+": "+score,10,25);

}


/* LOOP */

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

loop();


/* CONTROLS */

addEventListener("keydown",e=>{

if(!gameStarted) return;

if(e.key==="ArrowLeft") player.vx=-SPEED;
if(e.key==="ArrowRight") player.vx=SPEED;

});

addEventListener("keyup",()=>player.vx=0);


canvas.addEventListener("touchstart",e=>{

if(!gameStarted) return;

if(e.touches[0].clientX<GAME_WIDTH/2)
player.vx=-SPEED;
else
player.vx=SPEED;

});

canvas.addEventListener("touchend",()=>{

player.vx=0;

});

</script>

</body>
</html>
