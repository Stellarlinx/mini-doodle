<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#87CEEB;
  font-family:Arial;
}
canvas{
  display:block;
  touch-action:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}
#startScreen,#gameOverScreen{
  position:fixed;
  inset:0;
  background:rgba(135,206,235,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}
.menu{
  background:white;
  padding:20px;
  border-radius:12px;
  width:260px;
  text-align:center;
}
input{
  width:100%;
  padding:8px;
  margin-bottom:10px;
}
.skins{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
.skin{
  width:48px;
  height:48px;
  border-radius:8px;
  border:2px solid transparent;
  cursor:pointer;
  overflow:hidden;
}
.skin.selected{border-color:black;}
.skin img{
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
}
button{
  width:100%;
  padding:10px;
  font-size:16px;
  margin-top:6px;
}
</style>
</head>

<body>

<div id="startScreen">
  <div class="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Имя">

    <div class="skins">
      <div class="skin selected" data-color="green"><img src="img/player_green.png"></div>
      <div class="skin" data-color="blue"><img src="img/player_blue.png"></div>
      <div class="skin" data-color="red"><img src="img/player_red.png"></div>
      <div class="skin" data-color="purple"><img src="img/player_purple.png"></div>
    </div>

    <button id="playBtn">PLAY</button>
  </div>
</div>

<div id="gameOverScreen" style="display:none">
  <div class="menu">
    <h3>Game Over</h3>
    <p id="finalScore"></p>
    <button onclick="restartGame()">🔁 Restart</button>
    <button onclick="goHome()">🏠 Home</button>
  </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let IS_MOBILE = false;
let GAME_WIDTH = 0;

function resize(){
  IS_MOBILE = innerWidth < 768;
  GAME_WIDTH = IS_MOBILE ? innerWidth : 420;
  canvas.width = GAME_WIDTH;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* IMAGES */
const bgImage = new Image();
bgImage.src = "img/bg.png";

const playerSkins = {
  green:new Image(),
  blue:new Image(),
  red:new Image(),
  purple:new Image()
};
playerSkins.green.src="img/player_green.png";
playerSkins.blue.src="img/player_blue.png";
playerSkins.red.src="img/player_red.png";
playerSkins.purple.src="img/player_purple.png";

const monsterImages=["img/monster1.png","img/monster2.png"].map(s=>{
  const i=new Image(); i.src=s; return i;
});

/* DATA */
let playerName=localStorage.getItem("name")||"";
let playerColor=localStorage.getItem("color")||"green";
let score=0;
let gameStarted=false;

/* PLAYER */
const player={x:0,y:0,w:40,h:40,vx:0,vy:0};
const GRAVITY=0.38;
const JUMP=-14.5;
const SPEED_X=3.5;

let platforms=[];
let monsters=[];
let lastTime=performance.now();

/* UI */
document.getElementById("nameInput").value=playerName;

document.querySelectorAll(".skin").forEach(s=>{
  if(s.dataset.color===playerColor) s.classList.add("selected");
  s.onclick=()=>{
    document.querySelectorAll(".skin").forEach(x=>x.classList.remove("selected"));
    s.classList.add("selected");
    playerColor=s.dataset.color;
    localStorage.setItem("color",playerColor);
  };
});

document.getElementById("playBtn").onclick=()=>{
  playerName=document.getElementById("nameInput").value||"Player";
  localStorage.setItem("name",playerName);
  document.getElementById("startScreen").style.display="none";
  startGame();
};

/* GAME */
function startGame(){
  gameStarted=true;
  score=0;
  platforms=[];
  monsters=[];
  player.x=GAME_WIDTH/2-player.w/2;
  player.y=canvas.height-200;
  player.vx=0;
  player.vy=JUMP;

  platforms.push(makePlatform(player.x-30,player.y+60,"normal"));
  for(let i=1;i<12;i++) spawnPlatform(platforms[i-1].y-90);
}

function makePlatform(x,y,type){
  return{x,y,w:100,h:12,type,vx:0,broken:false,counted:false};
}
function spawnPlatform(y){
  platforms.push(makePlatform(Math.random()*(GAME_WIDTH-100),y,"normal"));
}

function update(dt){
  if(!gameStarted) return;

  player.vy+=GRAVITY*dt;
  player.x+=player.vx*dt;
  player.y+=player.vy*dt;

  if(player.x<-player.w) player.x=GAME_WIDTH;
  if(player.x>GAME_WIDTH) player.x=-player.w;

  platforms.forEach(p=>{
    if(player.vy>0 &&
      player.y+player.h>=p.y &&
      player.y+player.h<=p.y+p.h+player.vy &&
      player.x+player.w>p.x &&
      player.x<p.x+p.w){
      player.vy=JUMP;
      if(!p.counted){score++;p.counted=true;}
    }
  });

  if(player.y<canvas.height*0.45){
    const dy=-player.vy*dt;
    player.y=canvas.height*0.45;
    platforms.forEach(p=>p.y+=dy);
  }

  if(player.y>canvas.height) gameOver();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(bgImage,0,0,canvas.width,canvas.height);
  ctx.drawImage(playerSkins[playerColor],player.x,player.y,player.w,player.h);
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));
  ctx.fillText(`${playerName}: ${score}`,10,24);
}

function loop(t){
  const dt=(t-lastTime)/16;
  lastTime=t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* GAME OVER */
function gameOver(){
  gameStarted=false;
  document.getElementById("finalScore").innerText=`Score: ${score}`;
  document.getElementById("gameOverScreen").style.display="flex";
}
function restartGame(){
  document.getElementById("gameOverScreen").style.display="none";
  startGame();
}
function goHome(){
  document.getElementById("gameOverScreen").style.display="none";
  document.getElementById("startScreen").style.display="flex";
}

/* CONTROLS PC */
addEventListener("keydown",e=>{
  if(!gameStarted) return;
  if(e.key==="ArrowLeft") player.vx=-SPEED_X;
  if(e.key==="ArrowRight") player.vx=SPEED_X;
});
addEventListener("keyup",()=>player.vx=0);

/* CONTROLS MOBILE ✅ */
canvas.addEventListener("touchstart",e=>{
  if(!gameStarted) return;
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const x=e.touches[0].clientX-rect.left;
  player.vx = x < canvas.width/2 ? -SPEED_X : SPEED_X;
},{passive:false});

canvas.addEventListener("touchend",e=>{
  if(!gameStarted) return;
  e.preventDefault();
  player.vx=0;
},{passive:false});
</script>

</body>
</html>
