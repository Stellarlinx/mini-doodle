<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #87CEEB;
  font-family: Arial;
}
canvas {
  display: block;
  background: white;
}

/* ---------- UI ---------- */
#startScreen {
  position: fixed;
  inset: 0;
  background: rgba(135,206,235,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#menu {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 260px;
  text-align: center;
}

#menu input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

.skins {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.skin {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
}

.skin.selected {
  border-color: black;
}

button {
  width: 100%;
  padding: 10px;
  font-size: 16px;
}

#leaderboard {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.9);
  padding: 8px;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="startScreen">
  <div id="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Введите имя">

    <div class="skins">
      <div class="skin selected" data-color="green" style="background:green"></div>
      <div class="skin" data-color="blue" style="background:blue"></div>
      <div class="skin" data-color="red" style="background:red"></div>
      <div class="skin" data-color="purple" style="background:purple"></div>
    </div>

    <button id="playBtn">PLAY</button>
  </div>
</div>

<canvas id="game"></canvas>
<div id="leaderboard"></div>

<script>
/* ---------- CANVAS ---------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ---------- DATA ---------- */
let playerName = "";
let playerColor = "green";
let score = 0;
let gameStarted = false;
let monsterUnlock = Math.floor(5 + Math.random() * 6);

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

/* ---------- PLAYER ---------- */
const player = {
  x: canvas.width / 2 - 20,
  y: canvas.height - 200,
  width: 40,
  height: 40,
  velocityY: 0,
  jump: -15,
  speedX: 0
};

let gravity = 0.4;
let platforms = [];
let monsters = [];

/* ---------- START ---------- */
document.querySelectorAll(".skin").forEach(s=>{
  s.onclick = ()=>{
    document.querySelectorAll(".skin").forEach(x=>x.classList.remove("selected"));
    s.classList.add("selected");
    playerColor = s.dataset.color;
  };
});

document.getElementById("playBtn").onclick = ()=>{
  playerName = document.getElementById("nameInput").value || "Player";
  document.getElementById("startScreen").style.display = "none";
  startGame();
};

/* ---------- GAME INIT ---------- */
function startGame(){
  platforms = [];
  monsters = [];
  score = 0;
  monsterUnlock = Math.floor(5 + Math.random() * 6);

  platforms.push({
    x: player.x,
    y: player.y + 50,
    width: 100,
    height: 12,
    counted: true
  });

  for(let i=1;i<12;i++){
    platforms.push({
      x: Math.random()*(canvas.width-80),
      y: platforms[i-1].y - 90,
      width: 80,
      height: 12,
      counted:false
    });
  }

  player.velocityY = player.jump;
  gameStarted = true;
}

/* ---------- DRAW ---------- */
function drawPlayer(){
  ctx.fillStyle = playerColor;
  ctx.fillRect(player.x,player.y,player.width,player.height);
}

function drawPlatforms(){
  ctx.fillStyle="black";
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.width,p.height));
}

function drawMonsters(){
  ctx.fillStyle="purple";
  monsters.forEach(m=>ctx.fillRect(m.x,m.y,m.width,m.height));
}

function drawScore(){
  ctx.fillStyle="black";
  ctx.font="20px Arial";
  ctx.fillText(`${playerName}: ${score}`,10,30);
}

/* ---------- UPDATE ---------- */
function update(){
  if(!gameStarted) return;

  player.velocityY += gravity;
  player.y += player.velocityY;
  player.x += player.speedX;

  if(player.x < -player.width) player.x = canvas.width;
  if(player.x > canvas.width) player.x = -player.width;

  platforms.forEach(p=>{
    if(
      player.velocityY>0 &&
      player.y+player.height>=p.y &&
      player.y+player.height<=p.y+p.height+player.velocityY &&
      player.x+player.width>p.x &&
      player.x<p.x+p.width
    ){
      player.velocityY = player.jump;
      if(!p.counted){
        score++;
        p.counted=true;
      }
    }
  });

  monsters.forEach(m=>{
    if(
      player.x < m.x+m.width &&
      player.x+player.width > m.x &&
      player.y < m.y+m.height &&
      player.y+player.height > m.y
    ){
      gameOver();
    }
  });

  if(player.y < canvas.height/2){
    const dy = -player.velocityY;
    platforms.forEach(p=>p.y+=dy);
    monsters.forEach(m=>m.y+=dy);
    player.y = canvas.height/2;

    platforms.forEach(p=>{
      if(p.y>canvas.height){
        const top = Math.min(...platforms.map(x=>x.y));
        p.y = top-90;
        p.x = Math.random()*(canvas.width-p.width);
        p.counted=false;

        if(score>=monsterUnlock && Math.random()<0.3){
          monsters.push({
            x:p.x+20,
            y:p.y-40,
            width:40,
            height:40
          });
        }
      }
    });
  }

  if(player.y>canvas.height) gameOver();
}

/* ---------- LEADERBOARD ---------- */
function updateLeaderboard(){
  const existing = leaderboard.find(p=>p.name===playerName);
  if(existing){
    if(score>existing.score) existing.score=score;
  }else{
    leaderboard.push({name:playerName,score});
  }

  leaderboard.sort((a,b)=>b.score-a.score);
  localStorage.setItem("leaderboard",JSON.stringify(leaderboard));

  document.getElementById("leaderboard").innerHTML =
    "<b>🏆 ТОП-5</b><br>" +
    leaderboard.slice(0,5).map((p,i)=>`${i+1}. ${p.name}: ${p.score}`).join("<br>");
}

/* ---------- GAME OVER ---------- */
function gameOver(){
  updateLeaderboard();
  alert("Game Over!");
  location.reload();
}

/* ---------- LOOP ---------- */
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  update();
  drawPlayer();
  drawPlatforms();
  drawMonsters();
  drawScore();
  requestAnimationFrame(loop);
}
loop();

/* ---------- CONTROLS ---------- */
document.addEventListener("touchstart",e=>{
  player.speedX = e.touches[0].clientX < canvas.width/2 ? -4 : 4;
});
document.addEventListener("touchend",()=>player.speedX=0);

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") player.speedX=-4;
  if(e.key==="ArrowRight") player.speedX=4;
});
document.addEventListener("keyup",()=>player.speedX=0);
</script>

</body>
</html>
