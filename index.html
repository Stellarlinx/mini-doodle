<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Arial;
  background: #87CEEB;
}

/* CANVAS */
canvas {
  display: block;
  background: white;
  touch-action: none;
  pointer-events: none; /* 🔴 ВАЖНО */
}

/* MENU */
#startScreen {
  position: fixed;
  inset: 0;
  background: rgba(135,206,235,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#menu {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 260px;
  text-align: center;
}

#menu input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

.skins {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.skin {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
}

.skin.selected {
  border-color: black;
}

button {
  width: 100%;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="startScreen">
  <div id="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Введите имя">

    <div class="skins">
      <div class="skin selected" data-color="green" style="background:green"></div>
      <div class="skin" data-color="blue" style="background:blue"></div>
      <div class="skin" data-color="red" style="background:red"></div>
      <div class="skin" data-color="purple" style="background:purple"></div>
    </div>

    <button id="playBtn">PLAY</button>
  </div>
</div>

<canvas id="game"></canvas>

<script>
/* ---------- CANVAS ---------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* ---------- UI ---------- */
const startScreen = document.getElementById("startScreen");
const nameInput = document.getElementById("nameInput");
const playBtn = document.getElementById("playBtn");

/* ---------- DATA ---------- */
let playerName = "";
let playerColor = "green";

/* ---------- SKINS ---------- */
document.querySelectorAll(".skin").forEach(skin => {
  skin.addEventListener("click", () => {
    document.querySelectorAll(".skin").forEach(s => s.classList.remove("selected"));
    skin.classList.add("selected");
    playerColor = skin.dataset.color;
  });
});

/* ---------- PLAY ---------- */
playBtn.addEventListener("click", () => {
  playerName = nameInput.value || "Player";

  // 🔥 ВКЛЮЧАЕМ CANVAS
  canvas.style.pointerEvents = "auto";

  startScreen.style.display = "none";
  startGame();
});

/* ---------- GAME ---------- */
let gravity = 0.4;
let gameStarted = false;

const player = {
  x: 0, y: 0, w: 40, h: 40,
  vy: 0, jump: -15
};

let platforms = [];

function startGame() {
  gameStarted = true;
  platforms = [];

  player.x = canvas.width / 2 - 20;
  player.y = canvas.height - 200;
  player.vy = player.jump;

  platforms.push({
    x: player.x - 20,
    y: player.y + 60,
    w: 100,
    h: 12
  });
}

function update() {
  if (!gameStarted) return;

  player.vy += gravity;
  player.y += player.vy;

  if (player.y > canvas.height) {
    gameStarted = false;
    canvas.style.pointerEvents = "none";
    startScreen.style.display = "flex";
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = playerColor;
  ctx.fillRect(player.x, player.y, player.w, player.h);

  ctx.fillStyle = "black";
  platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
