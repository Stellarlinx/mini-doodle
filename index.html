<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
* { user-select:none; -webkit-user-select:none; }

html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:#87CEEB;
  font-family:Arial;
}

canvas {
  display:block;
  background:white;
  touch-action:none;
}

/* ---------- MENU ---------- */
#startScreen, #gameOverScreen {
  position:fixed;
  inset:0;
  background:rgba(135,206,235,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}

#menu, #gameOverBox {
  background:white;
  padding:20px;
  border-radius:12px;
  width:260px;
  text-align:center;
}

#menu input {
  width:100%;
  padding:8px;
  margin-bottom:10px;
  user-select:text;
}

.skins {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.skin {
  width:40px;
  height:40px;
  border-radius:6px;
  border:2px solid transparent;
  cursor:pointer;
}

.skin.selected { border-color:black; }

button {
  width:100%;
  padding:10px;
  font-size:16px;
  margin-top:6px;
}

/* ---------- HUD ---------- */
#hud {
  position:fixed;
  top:8px;
  right:8px;
  background:rgba(255,255,255,.9);
  padding:6px;
  border-radius:8px;
  font-size:12px;
}

#homeBtn {
  margin-top:6px;
  width:100%;
  font-size:12px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="startScreen">
  <div id="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Введите имя">
    <div class="skins">
      <div class="skin selected" data-color="green" style="background:green"></div>
      <div class="skin" data-color="blue" style="background:blue"></div>
      <div class="skin" data-color="red" style="background:red"></div>
      <div class="skin" data-color="purple" style="background:purple"></div>
    </div>
    <button id="playBtn">PLAY</button>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" style="display:none">
  <div id="gameOverBox">
    <h3>Game Over</h3>
    <div id="finalScore"></div>
    <button onclick="startGame()">Retry</button>
    <button onclick="goHome()">Home</button>
  </div>
</div>

<!-- HUD -->
<div id="hud"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize(); addEventListener("resize",resize);

/* ---------- STORAGE ---------- */
let leaderboard = JSON.parse(localStorage.getItem("leaderboard")||"[]");
let playerName = localStorage.getItem("playerName")||"";
let playerColor = localStorage.getItem("playerColor")||"green";

/* ---------- UI ---------- */
const startScreen = document.getElementById("startScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const nameInput = document.getElementById("nameInput");
nameInput.value = playerName;

document.querySelectorAll(".skin").forEach(s=>{
  if(s.dataset.color===playerColor) s.classList.add("selected");
  s.onclick=()=>{
    document.querySelectorAll(".skin").forEach(x=>x.classList.remove("selected"));
    s.classList.add("selected");
    playerColor=s.dataset.color;
  }
});

document.getElementById("playBtn").onclick=()=>{
  playerName=nameInput.value||"Player";
  localStorage.setItem("playerName",playerName);
  localStorage.setItem("playerColor",playerColor);
  startScreen.style.display="none";
  startGame();
};

/* ---------- GAME ---------- */
let gravity=0.4, score=0, gameStarted=false;
const player={x:0,y:0,w:40,h:40,vy:0,jump:-15,speedX:0};
let platforms=[], monsters=[];
let lastBreak=false;

function createPlatform(y){
  let type="normal";
  if(!lastBreak && Math.random()<0.15) type="break";
  else if(Math.random()<0.15) type="moving";
  lastBreak = type==="break";

  return {
    x:Math.random()*(canvas.width-80),
    y, w:80, h:12,
    type, dx:Math.random()<.5?-1:1,
    counted:false
  };
}

function startGame(){
  score=0; platforms=[]; monsters=[];
  gameOverScreen.style.display="none";
  gameStarted=true;
  lastBreak=false;

  player.x=canvas.width/2-20;
  player.y=canvas.height-200;
  player.vy=player.jump;

  platforms.push({x:player.x-20,y:player.y+60,w:100,h:12,type:"normal",counted:true});
  for(let i=1;i<14;i++) platforms.push(createPlatform(platforms[i-1].y-90));
}

function gameOver(){
  gameStarted=false;
  leaderboard.push({name:playerName,score});
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard=leaderboard.slice(0,5);
  localStorage.setItem("leaderboard",JSON.stringify(leaderboard));
  document.getElementById("finalScore").innerText=`Score: ${score}`;
  gameOverScreen.style.display="flex";
}

function goHome(){
  gameOverScreen.style.display="none";
  startScreen.style.display="flex";
}

function update(){
  if(!gameStarted) return;

  player.vy+=gravity;
  player.y+=player.vy;
  player.x+=player.speedX;

  if(player.x<-player.w) player.x=canvas.width;
  if(player.x>canvas.width) player.x=-player.w;

  platforms.forEach(p=>{
    if(p.type==="moving"){
      p.x+=p.dx*1.2;
      if(p.x<0||p.x+p.w>canvas.width) p.dx*=-1;
    }
    if(player.vy>0 &&
      player.y+player.h>=p.y &&
      player.y+player.h<=p.y+p.h+player.vy &&
      player.x+player.w>p.x &&
      player.x<p.x+p.w){
        if(p.type==="break") p.y=canvas.height+100;
        else{
          player.vy=player.jump;
          if(!p.counted){ score++; p.counted=true; }
        }
    }
  });

  if(player.y<canvas.height/2){
    const dy=-player.vy;
    player.y=canvas.height/2;
    platforms.forEach(p=>p.y+=dy);
    platforms.forEach(p=>{
      if(p.y>canvas.height){
        const top=Math.min(...platforms.map(pl=>pl.y));
        Object.assign(p,createPlatform(top-90));
      }
    });
  }

  if(player.y>canvas.height) gameOver();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=playerColor;
  ctx.fillRect(player.x,player.y,player.w,player.h);

  platforms.forEach(p=>{
    ctx.fillStyle=p.type==="moving"?"blue":p.type==="break"?"brown":"black";
    ctx.fillRect(p.x,p.y,p.w,p.h);
  });

  ctx.fillStyle="black";
  ctx.font="20px Arial";
  ctx.fillText(`${score}`,10,30);

  hud.innerHTML="<b>TOP-5</b><br>"+
    leaderboard.map((p,i)=>`${i+1}. ${p.name}: ${p.score}`).join("<br>")+
    `<button id="homeBtn" onclick="goHome()">HOME</button>`;
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();

/* ---------- CONTROLS ---------- */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  player.speedX = e.touches[0].clientX < canvas.width/2 ? -4 : 4;
},{passive:false});
canvas.addEventListener("touchend",e=>{
  e.preventDefault(); player.speedX=0;
},{passive:false});
addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") player.speedX=-4;
  if(e.key==="ArrowRight") player.speedX=4;
});
addEventListener("keyup",()=>player.speedX=0);
</script>

</body>
</html>
