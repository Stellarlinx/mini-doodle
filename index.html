<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
html,body{
  margin:0;padding:0;overflow:hidden;
  background:#87CEEB;font-family:Arial;
}
  .skin img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 6px;
  pointer-events: none;
}
canvas{
  display:block;
  touch-action:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}
#startScreen,#gameOverScreen{
  position:fixed;inset:0;
  background:rgba(135,206,235,.95);
  display:flex;align-items:center;justify-content:center;
  z-index:10;
}
.menu{
  background:white;padding:20px;border-radius:12px;
  width:260px;text-align:center;
}
input{width:100%;padding:8px;margin-bottom:10px;}
.skins{display:flex;justify-content:space-between;margin-bottom:10px;}
.skin{
  width:40px;height:40px;border-radius:6px;
  border:2px solid transparent;cursor:pointer;
}
.skin.selected{border-color:black;}
button{
  width:100%;padding:10px;font-size:16px;margin-top:6px;
}
#leaderboard{
  position:fixed;top:8px;right:8px;
  background:rgba(255,255,255,.9);
  padding:6px 8px;border-radius:6px;font-size:12px;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <div class="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Имя">
    <div class="skins">
  <div class="skin selected" data-color="green">
    <img src="img/player_green.png">
  </div>
  <div class="skin" data-color="blue">
    <img src="img/player_blue.png">
  </div>
  <div class="skin" data-color="red">
    <img src="img/player_red.png">
  </div>
  <div class="skin" data-color="purple">
    <img src="img/player_purple.png">
  </div>
</div>
    <button id="playBtn">PLAY</button>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" style="display:none">
  <div class="menu">
    <h3>Game Over</h3>
    <p id="finalScore"></p>
    <button onclick="restartGame()">🔁 Restart</button>
    <button onclick="goHome()">🏠 Home</button>
  </div>
</div>

<canvas id="game"></canvas>
<div id="leaderboard"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let IS_MOBILE=false;
let GAME_WIDTH=0;

function resize(){
IS_MOBILE=innerWidth<768;
GAME_WIDTH=IS_MOBILE?innerWidth:420;
canvas.width=GAME_WIDTH;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* IMAGES */

const bgImage=new Image();
bgImage.src="img/bg.png";

const playerSkins={
green:new Image(),
blue:new Image(),
red:new Image(),
purple:new Image()
};

playerSkins.green.src="img/player_green.png";
playerSkins.blue.src="img/player_blue.png";
playerSkins.red.src="img/player_red.png";
playerSkins.purple.src="img/player_purple.png";

const springImage=new Image();
springImage.src="img/spring.png";

const coinImage=new Image();
coinImage.src="img/coin.png";

const monsterImages=[
"img/monster1.png",
"img/monster2.png"
].map(src=>{
let i=new Image();
i.src=src;
return i;
});

/* DATA */

let playerName=localStorage.getItem("name")||"";
let playerColor=localStorage.getItem("color")||"green";
let score=0;
let gameStarted=false;
let leaderboard=JSON.parse(localStorage.getItem("leaderboard"))||[];

/* PLAYER */

const player={
x:0,y:0,w:40,h:40,vx:0,vy:0
};

const GRAVITY=0.4;
const JUMP=-15;
const SPEED_X=4;

/* OBJECTS */

let platforms=[];
let monsters=[];
let springs=[];
let coins=[];
let lastTime=performance.now();

/* UI */

document.getElementById("nameInput").value=playerName;

document.querySelectorAll(".skin").forEach(s=>{

if(s.dataset.color===playerColor)
s.classList.add("selected");

s.onclick=()=>{
document.querySelectorAll(".skin")
.forEach(x=>x.classList.remove("selected"));

s.classList.add("selected");

playerColor=s.dataset.color;

localStorage.setItem("color",playerColor);
};

});

document.getElementById("playBtn").onclick=()=>{
playerName=document.getElementById("nameInput").value||"Player";
localStorage.setItem("name",playerName);

document.getElementById("startScreen").style.display="none";

startGame();
};

/* INIT */

function startGame(){

gameStarted=true;
score=0;

platforms=[];
monsters=[];
springs=[];
coins=[];

player.x=GAME_WIDTH/2-player.w/2;
player.y=canvas.height-200;
player.vx=0;
player.vy=JUMP;

platforms.push(makePlatform(player.x-30,player.y+60,"normal"));

for(let i=1;i<12;i++){
spawnPlatform(platforms[i-1].y-90);
}

}

/* PLATFORM */

function makePlatform(x,y,type){

return{
x,y,
w:type==="normal"?100:80,
h:12,
type,
vx:type==="move"?(Math.random()<.5?-1:1)*1.2:0,
broken:false,
counted:false
};

}

function spawnPlatform(y){

let r=Math.random();
let type="normal";

if(r<.12) type="break";
else if(r<.28) type="move";

let p=makePlatform(Math.random()*(GAME_WIDTH-100),y,type);

platforms.push(p);

/* SPRING */

if(Math.random()<0.12){

springs.push({
x:p.x+p.w/2-12,
y:p.y-20,
w:24,
h:20
});

}

/* COIN */

if(Math.random()<0.25){

coins.push({
x:p.x+p.w/2-12,
y:p.y-40,
w:24,
h:24,
collected:false
});

}

}

/* MONSTER */

function trySpawnMonster(p){

if(score<6) return;
if(Math.random()>0.25) return;

monsters.push({

x:p.x+p.w/2-20,
y:p.y-45,
w:40,
h:40,
vx:(Math.random()<.5?-1:1)*1.6,
skin:monsterImages[Math.floor(Math.random()*monsterImages.length)]

});

}

/* UPDATE */

function update(dt){

if(!gameStarted) return;

/* PHYSICS */

player.vy+=GRAVITY*dt;
player.x+=player.vx*dt;
player.y+=player.vy*dt;

/* SCREEN LOOP */

if(player.x<-player.w) player.x=GAME_WIDTH;
if(player.x>GAME_WIDTH) player.x=-player.w;

/* PLATFORM COLLISION */

platforms.forEach(p=>{

if(p.type==="move"){
p.x+=p.vx*dt;

if(p.x<0||p.x+p.w>GAME_WIDTH)
p.vx*=-1;
}

if(!p.broken &&
player.vy>0 &&
player.y+player.h>=p.y &&
player.y+player.h<=p.y+p.h+player.vy &&
player.x+player.w>p.x &&
player.x<p.x+p.w){

if(p.type==="break"){

p.broken=true;

}else{

player.vy=JUMP;

if(!p.counted){
score++;
p.counted=true;
}

}

}

});

/* SPRING */

springs.forEach(s=>{

if(player.vy>0 &&
player.x+player.w>s.x &&
player.x<s.x+s.w &&
player.y+player.h>=s.y &&
player.y+player.h<=s.y+20){

player.vy=JUMP*1.8;

}

});

/* COINS */

coins.forEach(c=>{

if(!c.collected &&
player.x<c.x+c.w &&
player.x+player.w>c.x &&
player.y<c.y+c.h &&
player.y+player.h>c.y){

c.collected=true;
score+=3;

}

});

/* MONSTERS */

monsters.forEach(m=>{

m.x+=m.vx*dt;

if(m.x<0||m.x+m.w>GAME_WIDTH)
m.vx*=-1;

if(player.x<m.x+m.w &&
player.x+player.w>m.x &&
player.y<m.y+m.h &&
player.y+player.h>m.y){

gameOver();

}

});

/* CAMERA */

if(player.y<canvas.height*.45){

const dy=-player.vy*dt;

player.y=canvas.height*.45;

platforms.forEach(p=>p.y+=dy);
monsters.forEach(m=>m.y+=dy);
springs.forEach(s=>s.y+=dy);
coins.forEach(c=>c.y+=dy);

platforms.forEach(p=>{

if(p.y>canvas.height){

const top=Math.min(...platforms.map(x=>x.y));

p.y=top-90;
p.x=Math.random()*(GAME_WIDTH-p.w);
p.broken=false;
p.counted=false;

trySpawnMonster(p);

}

});

}

if(player.y>canvas.height)
gameOver();

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(bgImage,0,0,canvas.width,canvas.height);

ctx.drawImage(
playerSkins[playerColor],
player.x,
player.y,
player.w,
player.h
);

platforms.forEach(p=>{
if(p.broken) return;

ctx.fillStyle=
p.type==="move"?"blue":
p.type==="break"?"brown":"black";

ctx.fillRect(p.x,p.y,p.w,p.h);
});

springs.forEach(s=>{
ctx.drawImage(springImage,s.x,s.y,s.w,s.h);
});

coins.forEach(c=>{
if(!c.collected)
ctx.drawImage(coinImage,c.x,c.y,c.w,c.h);
});

monsters.forEach(m=>{
ctx.drawImage(m.skin,m.x,m.y,m.w,m.h);
});

ctx.fillStyle="black";
ctx.font="18px Arial";
ctx.fillText(`${playerName}: ${score}`,10,26);

}

/* LOOP */

function loop(t){

const dt=Math.min((t-lastTime)/16,1.5);

lastTime=t;

update(dt);
draw();

requestAnimationFrame(loop);

}

requestAnimationFrame(loop);

/* GAME OVER */

function gameOver(){

gameStarted=false;

document.getElementById("finalScore").innerText=`Score: ${score}`;
document.getElementById("gameOverScreen").style.display="flex";

}

function restartGame(){

document.getElementById("gameOverScreen").style.display="none";

startGame();

}

function goHome(){

document.getElementById("gameOverScreen").style.display="none";

document.getElementById("startScreen").style.display="flex";

}

/* CONTROLS */

addEventListener("keydown",e=>{

if(!gameStarted) return;

if(e.key==="ArrowLeft")
player.vx=-SPEED_X;

if(e.key==="ArrowRight")
player.vx=SPEED_X;

});

addEventListener("keyup",()=>{
player.vx=0;
});

canvas.addEventListener("touchstart",e=>{

if(!gameStarted) return;

e.preventDefault();

player.vx=
e.touches[0].clientX<GAME_WIDTH/2
?-SPEED_X
:SPEED_X;

},{passive:false});

canvas.addEventListener("touchend",e=>{

if(!gameStarted) return;

e.preventDefault();

player.vx=0;

},{passive:false});

</script>

</body>
</html>
