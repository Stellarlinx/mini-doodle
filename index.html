<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #87CEEB;
  font-family: Arial;
}

canvas {
  display: block;
  background: white;
  touch-action: none;
}

#startScreen, #gameOverScreen {
  position: fixed;
  inset: 0;
  background: rgba(135,206,235,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.menu {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 260px;
  text-align: center;
}

input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

.skins {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.skin {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  border: 2px solid transparent;
}

.skin.selected {
  border-color: black;
}

button {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-top: 6px;
}

#leaderboard {
  position: fixed;
  top: 8px;
  right: 8px;
  background: rgba(255,255,255,0.9);
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 12px;
}
</style>
</head>

<body>

<div id="startScreen">
  <div class="menu">
    <h3>Doodle Jump</h3>
    <input id="nameInput" placeholder="Имя">
    <div class="skins">
      <div class="skin selected" data-color="green" style="background:green"></div>
      <div class="skin" data-color="blue" style="background:blue"></div>
      <div class="skin" data-color="red" style="background:red"></div>
      <div class="skin" data-color="purple" style="background:purple"></div>
    </div>
    <button id="playBtn">PLAY</button>
  </div>
</div>

<div id="gameOverScreen" style="display:none">
  <div class="menu">
    <h3>Game Over</h3>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Restart</button>
    <button onclick="goHome()">Home</button>
  </div>
</div>

<canvas id="game"></canvas>
<div id="leaderboard"></div>

<script>
/* ---------- CANVAS ---------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* ---------- DEVICE SCALE ---------- */
const IS_DESKTOP = canvas.width > 700;
const SCALE = IS_DESKTOP ? 1.3 : 1;

/* ---------- GAME CONFIG ---------- */
const PLAYER_SIZE = 40 * SCALE;
const PLATFORM_WIDTH = 100 * SCALE;
const PLATFORM_GAP = 90 * SCALE;
const GRAVITY = 0.4 * SCALE;
const JUMP_FORCE = -15 * SCALE;

/* ---------- DATA ---------- */
let playerName = localStorage.getItem("name") || "";
let playerColor = localStorage.getItem("color") || "green";
let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
let score = 0;
let gameStarted = false;
let lastPlatformWasBreak = false;

/* ---------- PLAYER ---------- */
const player = {
  x: 0, y: 0,
  w: PLAYER_SIZE, h: PLAYER_SIZE,
  vx: 0, vy: 0
};

let platforms = [];
let monsters = [];

/* ---------- UI ---------- */
const startScreen = document.getElementById("startScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const nameInput = document.getElementById("nameInput");
nameInput.value = playerName;

/* ---------- SKINS ---------- */
document.querySelectorAll(".skin").forEach(s=>{
  if(s.dataset.color === playerColor) s.classList.add("selected");
  s.onclick = ()=>{
    document.querySelectorAll(".skin").forEach(x=>x.classList.remove("selected"));
    s.classList.add("selected");
    playerColor = s.dataset.color;
    localStorage.setItem("color", playerColor);
  };
});

/* ---------- START ---------- */
document.getElementById("playBtn").onclick = ()=>{
  playerName = nameInput.value || "Player";
  localStorage.setItem("name", playerName);
  startScreen.style.display = "none";
  startGame();
};

/* ---------- INIT ---------- */
function makePlatform(x,y,type){
  return {
    x,y,
    w: PLATFORM_WIDTH,
    h: 12 * SCALE,
    type,
    vx: type==="move" ? (Math.random()<0.5?-1:1)*1.3*SCALE : 0,
    broken:false,
    counted:false
  };
}

function spawnPlatform(y){
  let r=Math.random(), type="normal";
  if(!lastPlatformWasBreak && r<0.15){ type="break"; lastPlatformWasBreak=true; }
  else if(r<0.3){ type="move"; lastPlatformWasBreak=false; }
  else lastPlatformWasBreak=false;

  platforms.push(makePlatform(Math.random()*(canvas.width-PLATFORM_WIDTH),y,type));
}

function startGame(){
  gameStarted=true;
  score=0;
  platforms=[];
  monsters=[];
  lastPlatformWasBreak=false;

  player.x=canvas.width/2-player.w/2;
  player.y=canvas.height-200;
  player.vx=0;
  player.vy=JUMP_FORCE;

  platforms.push(makePlatform(player.x-20,player.y+60,"normal"));
  for(let i=1;i<12;i++) spawnPlatform(platforms[i-1].y-PLATFORM_GAP);
}

/* ---------- MONSTERS ---------- */
function trySpawnMonster(p){
  if(score<6 || monsters.length>=2 || Math.random()>0.25) return;
  monsters.push({
    x:p.x,
    y:p.y-40*SCALE,
    w:40*SCALE,
    h:40*SCALE,
    vx:(Math.random()<0.5?-1:1)*1.5*SCALE
  });
}

/* ---------- UPDATE ---------- */
function update(){
  if(!gameStarted) return;

  player.vy+=GRAVITY;
  player.x+=player.vx;
  player.y+=player.vy;

  if(player.x<-player.w) player.x=canvas.width;
  if(player.x>canvas.width) player.x=-player.w;

  platforms.forEach(p=>{
    if(p.type==="move"){
      p.x+=p.vx;
      if(p.x<0||p.x+p.w>canvas.width) p.vx*=-1;
    }

    if(!p.broken && player.vy>0 &&
      player.y+player.h>=p.y &&
      player.y+player.h<=p.y+p.h+player.vy &&
      player.x+player.w>p.x &&
      player.x<p.x+p.w
    ){
      if(p.type==="break") p.broken=true;
      else{
        player.vy=JUMP_FORCE;
        if(!p.counted){ score++; p.counted=true; }
      }
    }
  });

  monsters.forEach(m=>{
    m.x+=m.vx;
    if(m.x<0||m.x+m.w>canvas.width) m.vx*=-1;
    if(player.x<m.x+m.w&&player.x+player.w>m.x&&player.y<m.y+m.h&&player.y+player.h>m.y)
      gameOver();
  });

  if(player.y<canvas.height/2){
    let dy=-player.vy;
    player.y=canvas.height/2;
    platforms.forEach(p=>p.y+=dy);
    monsters.forEach(m=>m.y+=dy);

    platforms.forEach(p=>{
      if(p.y>canvas.height){
        const top=Math.min(...platforms.map(x=>x.y));
        p.y=top-PLATFORM_GAP;
        p.x=Math.random()*(canvas.width-p.w);
        p.broken=false;
        p.counted=false;
        trySpawnMonster(p);
      }
    });
  }

  if(player.y>canvas.height) gameOver();
}

/* ---------- DRAW ---------- */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle=playerColor;
  ctx.fillRect(player.x,player.y,player.w,player.h);

  platforms.forEach(p=>{
    if(p.broken) return;
    ctx.fillStyle=p.type==="move"?"blue":p.type==="break"?"brown":"black";
    ctx.fillRect(p.x,p.y,p.w,p.h);
  });

  ctx.fillStyle="purple";
  monsters.forEach(m=>ctx.fillRect(m.x,m.y,m.w,m.h));

  ctx.fillStyle="black";
  ctx.font=`${18*SCALE}px Arial`;
  ctx.fillText(`${playerName}: ${score}`,10,26*SCALE);
}

/* ---------- LOOP ---------- */
function loop(){
  update();
  draw();
  document.getElementById("leaderboard").innerHTML =
    "<b>TOP 5</b><br>"+leaderboard.slice(0,5).map((p,i)=>`${i+1}. ${p.name}: ${p.score}`).join("<br>");
  requestAnimationFrame(loop);
}
loop();

/* ---------- GAME OVER ---------- */
function saveScore(){
  let e=leaderboard.find(p=>p.name===playerName);
  if(e){ if(score>e.score) e.score=score; }
  else leaderboard.push({name:playerName,score});
  leaderboard.sort((a,b)=>b.score-a.score);
  localStorage.setItem("leaderboard",JSON.stringify(leaderboard));
}

function gameOver(){
  saveScore();
  gameStarted=false;
  document.getElementById("finalScore").innerText=`Score: ${score}`;
  gameOverScreen.style.display="flex";
}

function restartGame(){
  gameOverScreen.style.display="none";
  startGame();
}

function goHome(){
  gameOverScreen.style.display="none";
  startScreen.style.display="flex";
}

/* ---------- CONTROLS ---------- */
addEventListener("keydown",e=>{
  if(!gameStarted) return;
  if(e.key==="ArrowLeft") player.vx=-4*SCALE;
  if(e.key==="ArrowRight") player.vx=4*SCALE;
});
addEventListener("keyup",()=>player.vx=0);

canvas.addEventListener("touchstart",e=>{
  if(!gameStarted) return;
  e.preventDefault();
  player.vx=e.touches[0].clientX<canvas.width/2?-4*SCALE:4*SCALE;
},{passive:false});

canvas.addEventListener("touchend",e=>{
  if(!gameStarted) return;
  e.preventDefault();
  player.vx=0;
},{passive:false});
</script>

</body>
</html>
